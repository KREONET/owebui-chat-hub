#### LiteLLM 서버 설정 ####
litellm_settings:
  num_retries: 5
  request_timeout: 180
  allowed_fails: 3
  cooldown_time: 30
  callbacks: ["prometheus", "perplexity_citation_callback.proxy_handler_instance", "elice_agent_handler.proxy_handler_instance"]
  drop_params: true


#### Open WebUI 모델 기본 설정 ####
owebui_default_model_meta:
  capabilities:
    file_context: true
    vision: true
    file_upload: true
    web_search: false
    image_generation: false
    code_interpreter: false
    citations: true
    status_updates: true
    usage: true
    builtin_tools: true
  builtinTools:
    time: true
    memory: true
    chats: true
    notes: true
    knowledge: true
    channels: true
    web_search: false
    image_generation: false
    code_interpreter: false
