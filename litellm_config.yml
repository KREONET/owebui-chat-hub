#### 파라미터 템플릿 ####
x-params:
  # 빠른 모델
  fast: &fast
    timeout: 60
    stream_timeout: 10

  fast_2x: &fast_2x
    timeout: 120
    stream_timeout: 20

  # 추론 모델
  _thinking-base: &thinking-base
    thinking: {"type": "enabled", "budget_tokens": 1024}
    merge_reasoning_content_in_choices: true

  thinking: &thinking
    <<: *thinking-base
    timeout: 180
    stream_timeout: 20

  thinking_3x: &thinking_3x
    <<: *thinking-base
    timeout: 540
    stream_timeout: 60

  # 이미지 생성 모델
  fast-image: &fast-image
    timeout: 300

  slow-image: &slow-image
    timeout: 600

  # Elice 자격증명
  elice: &elice
    api_key: os.environ/ELICE_API_KEY

  # BizRouter 자격증명
  bizrouter: &bizrouter
    api_base: https://api.bizrouter.ai/v1
    api_key: os.environ/BIZROUTER_API_KEY

  # Google Cloud Platform 자격증명
  gcp: &gcp
    api_key: os.environ/GEMINI_API_KEY

  # NAVER CLOVA 자격증명
  naver: &naver
    api_base: https://clovastudio.stream.ntruss.com/v1/openai
    api_key: os.environ/NAVER_OPENAI_API_KEY

  # AWS Bedrock 자격증명
  aws-creds: &aws-creds
    aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID
    aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY

  # Azure OpenAI 자격증명
  azure-us: &azure-us
    api_base: os.environ/AZURE_US_OPENAI_ENDPOINT
    api_version: 2024-12-01-preview
    api_key: os.environ/AZURE_US_OPENAI_API_KEY


